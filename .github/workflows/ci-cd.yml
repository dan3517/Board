name: Board API CI/CD

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-and-package:
    name: Test and package

    runs-on: ubuntu-latest

    timeout-minutes: 35

    env:
      FILE_STORAGE: local
      LOCAL_FILE_ROOT: ${{ runner.temp }}/board-ci-uploads

      JWT_SECRET: aW50ZWdyYXRpb24tdGVzdC1qd3Qtc2VjcmV0LWtleS0xMjM0NTY=
      JWT_ACCESS_TOKEN_EXPIRATION_MS: "3600000"
      JWT_REFRESH_TOKEN_EXPIRATION_MS: "86400000"

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          add-job-summary: on-failure

      - name: Grant execute permission to Gradle Wrapper
        run: chmod +x gradlew

      - name: Display Java and Gradle versions
        run: |
          java -version
          ./gradlew --version

      - name: Run unit tests
        run: |
          ./gradlew clean test \
            --stacktrace \
            --no-daemon

      - name: Check Docker for Testcontainers
        run: |
          docker version
          docker info

      - name: Run Testcontainers integration tests
        run: |
          ./gradlew integrationTest \
            --stacktrace \
            --no-daemon

      - name: Build executable JAR
        run: |
          ./gradlew bootJar \
            --stacktrace \
            --no-daemon

      - name: Prepare deployment artifact
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          test -f build/libs/board-api.jar

          mkdir -p dist

          cp \
            build/libs/board-api.jar \
            "dist/board-api-${RELEASE_SHA}.jar"

          (
            cd dist

            sha256sum \
              "board-api-${RELEASE_SHA}.jar" \
              > "board-api-${RELEASE_SHA}.jar.sha256"

            sha256sum -c \
              "board-api-${RELEASE_SHA}.jar.sha256"
          )

          ls -lh dist

      - name: Upload deployment artifact
        if: >-
          github.event_name != 'pull_request'
          && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: board-api-${{ github.sha }}
          path: |
            dist/board-api-${{ github.sha }}.jar
            dist/board-api-${{ github.sha }}.jar.sha256
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            build/reports/tests/**
            build/test-results/**
          if-no-files-found: ignore
          retention-days: 7

  deploy:
    name: Deploy to production EC2

    if: >-
      github.event_name != 'pull_request'
      && github.ref == 'refs/heads/main'

    needs:
      - verify-and-package

    runs-on: ubuntu-latest

    timeout-minutes: 15

    environment:
      name: production

    concurrency:
      group: board-api-production
      cancel-in-progress: false

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v8
        with:
          name: board-api-${{ github.sha }}
          path: dist

      - name: Verify downloaded artifact
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          ls -lh dist

          (
            cd dist

            sha256sum -c \
              "board-api-${RELEASE_SHA}.jar.sha256"
          )

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.EC2_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          install \
            -d \
            -m 700 \
            "${HOME}/.ssh"

          printf '%s\n' \
            "${SSH_PRIVATE_KEY}" \
            > "${HOME}/.ssh/id_ed25519"

          chmod 600 \
            "${HOME}/.ssh/id_ed25519"

          printf '%s\n' \
            "${SSH_KNOWN_HOSTS}" \
            > "${HOME}/.ssh/known_hosts"

          chmod 600 \
            "${HOME}/.ssh/known_hosts"

      - name: Upload JAR to EC2
        env:
          RELEASE_SHA: ${{ github.sha }}
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USER: ${{ vars.EC2_USER }}
          EC2_SSH_PORT: ${{ vars.EC2_SSH_PORT }}
        run: |
          set -euo pipefail

          SSH_PORT="${EC2_SSH_PORT:-22}"

          scp \
            -i "${HOME}/.ssh/id_ed25519" \
            -P "${SSH_PORT}" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${HOME}/.ssh/known_hosts" \
            "dist/board-api-${RELEASE_SHA}.jar" \
            "dist/board-api-${RELEASE_SHA}.jar.sha256" \
            "${EC2_USER}@${EC2_HOST}:/home/${EC2_USER}/board-deploy/"

      - name: Run deployment script
        env:
          RELEASE_SHA: ${{ github.sha }}
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USER: ${{ vars.EC2_USER }}
          EC2_SSH_PORT: ${{ vars.EC2_SSH_PORT }}
        run: |
          set -euo pipefail

          SSH_PORT="${EC2_SSH_PORT:-22}"

          ssh \
            -i "${HOME}/.ssh/id_ed25519" \
            -p "${SSH_PORT}" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${HOME}/.ssh/known_hosts" \
            "${EC2_USER}@${EC2_HOST}" \
            "sudo /usr/local/bin/deploy-board-api \
              '/home/${EC2_USER}/board-deploy/board-api-${RELEASE_SHA}.jar' \
              '${RELEASE_SHA}'"

      - name: Remove SSH private key
        if: always()
        run: |
          rm -f \
            "${HOME}/.ssh/id_ed25519"