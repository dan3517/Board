spring:
  datasource:
    url: jdbc:h2:mem:board;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop

    open-in-view: false

    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

jwt:
  secret: dGVzdC1qd3Qtc2VjcmV0LWtleS1tdXN0LWJlLWF0LWxlYXN0LTMyLWJ5dGVz
  access-token-expiration-ms: 1800000
  refresh-token-expiration-ms: 1209600000

app:
  image:
    max-count: 5
    max-size-bytes: 10485760

  file:
    storage: local

    local:
      root-path: ./build/test-uploads
      public-base-url: http://localhost:8080/files

    s3:
      bucket: test-board-bucket
      region: ap-northeast-2
      presigned-url-duration-minutes: 10